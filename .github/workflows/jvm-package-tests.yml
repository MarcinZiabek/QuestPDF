name: JVM Package Tests

permissions:
  actions: write
  contents: read

on:
  pull_request:
    paths:
      - '.github/workflows/jvm-package-tests.yml'
      - 'src/dotnet/interop/**'
      - 'src/dotnet/port-generator/**'
      - 'src/jvm/**'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/jvm-package-tests.yml'
      - 'src/dotnet/interop/**'
      - 'src/dotnet/port-generator/**'
      - 'src/jvm/**'
  workflow_dispatch:

env:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1

jobs:
  # Stage 1: build the QuestPDF.Native shared library (NativeAOT) for every
  # supported platform. NativeAOT cannot cross-compile, so each platform builds
  # on its own runner. Linux builds run in ubuntu:22.04 containers so the
  # produced binaries stay compatible with older glibc versions.
  #
  # linux-musl-x64 is not part of the JVM matrix: JNA ships no musl build of
  # libjnidispatch, so the package cannot work on Alpine out of the box.
  native:
    name: Native ${{ matrix.platform.rid }}
    runs-on: ${{ matrix.platform.runs-on }}
    container: ${{ matrix.platform.container }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { rid: win-x64, runs-on: windows-latest }
          - { rid: win-arm64, runs-on: windows-11-arm }
          - { rid: linux-x64, runs-on: ubuntu-latest, container: 'ubuntu:22.04' }
          - { rid: linux-arm64, runs-on: ubuntu-24.04-arm, container: 'ubuntu:22.04' }
          - { rid: osx-x64, runs-on: macos-26-intel }
          - { rid: osx-arm64, runs-on: macos-latest }

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Ubuntu prerequisites
        if: matrix.platform.container != ''
        shell: bash
        run: |
          apt update --yes
          apt install --yes curl ca-certificates clang zlib1g-dev tar gzip

      - name: Setup .NET SDK (container)
        if: matrix.platform.container != ''
        shell: bash
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel 10.0 --install-dir "$HOME/.dotnet"
          echo "$HOME/.dotnet" >> "$GITHUB_PATH"
          echo "DOTNET_ROOT=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Setup .NET SDK
        if: matrix.platform.container == ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Generate interop sources
        run: dotnet run --project src/dotnet/port-generator/QuestPDF.Interop.Generator

      - name: Publish QuestPDF.Native
        shell: bash
        run: |
          dotnet publish src/dotnet/interop -c Release -r "${{ matrix.platform.rid }}" -o "artifacts/native-staging/${{ matrix.platform.rid }}"
          rm -rf artifacts/native-staging/${{ matrix.platform.rid }}/*.dSYM

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform.rid }}
          path: artifacts/native-staging/${{ matrix.platform.rid }}

  # Stage 2: assemble the Maven package (main jar + one natives classifier jar
  # per platform) into a local directory feed and share it with the test jobs.
  pack:
    name: Pack QuestPDF (Maven feed)
    needs: native
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      package-version: ${{ steps.version.outputs.package-version }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Create package version
        id: version
        run: echo "package-version=0.1.0-ci.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate interop sources
        run: dotnet run --project src/dotnet/port-generator/QuestPDF.Interop.Generator

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/native-staging

      - name: Normalize native staging layout
        run: |
          cd artifacts/native-staging
          for directory in native-*; do mv "$directory" "${directory#native-}"; done
          ls -R .

      - name: Publish package to local feed
        working-directory: src/jvm/package
        run: |
          ./gradlew publishToLocalFeed \
            -PquestpdfVersion="${{ steps.version.outputs.package-version }}" \
            -PquestpdfNativesDir="$GITHUB_WORKSPACE/artifacts/native-staging" \
            -PquestpdfFeedDir="$GITHUB_WORKSPACE/artifacts/maven-feed"

      - name: Upload package feed
        uses: actions/upload-artifact@v4
        with:
          name: maven-feed
          path: artifacts/maven-feed

  # Stage 3: consume the package from the local feed on every supported
  # platform: a Gradle console app, a Maven console app (shaded fat jar), and
  # a Spring Boot web app (nested-jar classloader).
  test:
    name: Test ${{ matrix.platform.rid }}
    needs: pack
    runs-on: ${{ matrix.platform.runs-on }}
    container: ${{ matrix.platform.container }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { rid: win-x64, runs-on: windows-latest }
          - { rid: win-arm64, runs-on: windows-11-arm }
          - { rid: linux-x64, runs-on: ubuntu-latest, container: 'ubuntu:24.04' }
          - { rid: linux-arm64, runs-on: ubuntu-24.04-arm, container: 'ubuntu:24.04' }
          - { rid: osx-x64, runs-on: macos-26-intel }
          - { rid: osx-arm64, runs-on: macos-latest }

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Ubuntu prerequisites
        if: matrix.platform.container != ''
        shell: bash
        run: |
          apt update --yes
          apt install --yes curl ca-certificates unzip zip openjdk-21-jdk nodejs npm

      - name: Setup JDK
        if: matrix.platform.container == ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install zx
        shell: bash
        run: npm install --global zx@8

      - name: Download package feed
        uses: actions/download-artifact@v4
        with:
          name: maven-feed
          path: artifacts/maven-feed

      - name: Run package tests
        shell: bash
        run: zx src/jvm/package-tests/run-tests.mjs --version "${{ needs.pack.outputs.package-version }}"

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: out-jvm-${{ matrix.platform.rid }}
          path: artifacts/test-output/**

  merge-output-artifacts:
    name: Merge test output artifacts
    needs: test
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10

    steps:
      - name: Merge test output artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: questpdf-jvm-package-tests-output
          pattern: out-jvm-*
          separate-directories: true
          delete-merged: true
